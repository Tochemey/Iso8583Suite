<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" width="720" height="150">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Network icon: two nodes with connecting lines representing client/server -->
  <g transform="translate(40, 38)">
    <!-- Left node (client) -->
    <rect x="0" y="16" width="28" height="28" rx="6" fill="none" stroke="url(#icon)" stroke-width="2.5"/>
    <rect x="6" y="22" width="16" height="4" rx="1" fill="#0284c7" opacity="0.75"/>
    <rect x="6" y="29" width="10" height="4" rx="1" fill="#0284c7" opacity="0.55"/>
    <rect x="6" y="36" width="13" height="4" rx="1" fill="#0284c7" opacity="0.4"/>

    <!-- Connection lines -->
    <line x1="28" y1="30" x2="44" y2="20" stroke="url(#icon)" stroke-width="2" opacity="0.8"/>
    <line x1="28" y1="30" x2="44" y2="40" stroke="url(#icon)" stroke-width="2" opacity="0.8"/>
    <line x1="28" y1="30" x2="44" y2="30" stroke="url(#icon)" stroke-width="2"/>

    <!-- Data dots on lines -->
    <circle cx="36" cy="25" r="1.5" fill="#6366f1">
      <animate attributeName="cx" values="30;42;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="35" r="1.5" fill="#0284c7">
      <animate attributeName="cx" values="42;30;42" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Right node (server) -->
    <rect x="44" y="6" width="28" height="48" rx="6" fill="none" stroke="url(#icon)" stroke-width="2.5"/>
    <circle cx="58" cy="16" r="3" fill="#6366f1" opacity="0.8"/>
    <circle cx="58" cy="26" r="3" fill="#0284c7" opacity="0.7"/>
    <circle cx="58" cy="36" r="3" fill="#a855f7" opacity="0.6"/>
    <circle cx="58" cy="46" r="3" fill="#6366f1" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="150" y="68" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" letter-spacing="-0.5">
    <tspan font-weight="700" fill="#0f172a">Iso8583</tspan><tspan font-weight="300" fill="url(#accent)">Suite</tspan>
  </text>

  <!-- Tagline -->
  <text x="150" y="95" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#475569" letter-spacing="0.3">.NET High Performance ISO 8583 Client &amp; Server</text>

  <!-- Accent line under tagline -->
  <rect x="150" y="105" width="60" height="2" rx="1" fill="url(#accent)" opacity="0.7"/>
</svg>
